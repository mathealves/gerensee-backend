# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCOUNT_ID         — your 12-digit AWS account ID
#   RAILWAY_DEPLOY_HOOK_URL — from Railway: service → Settings → Deploy → Deploy Hook
#
# Required AWS setup (one-time, manual):
#   1. Create an OIDC identity provider in IAM:
#        Provider URL: https://token.actions.githubusercontent.com
#        Audience:     sts.amazonaws.com
#   2. Run `terraform apply` — it will create the github-actions-ecr-push IAM role.
#   3. Copy the role ARN from `terraform output github_actions_role_arn` into
#      the role-to-assume field below (or store as a secret).

name: CI/CD — Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: gerensee/backend

jobs:
  # ─── Job 1: Lint & Test ───────────────────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      # - name: Unit tests
      #   run: pnpm test --passWithNoTests

