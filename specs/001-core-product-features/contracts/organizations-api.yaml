openapi: 3.0.3
info:
  title: Gerensee API - Organizations
  description: Organization and membership management endpoints
  version: 1.0.0

servers:
  - url: http://localhost:3000/api/v1
    description: Development server

tags:
  - name: Organizations
    description: Organization management
  - name: Members
    description: Organization membership management

paths:
  /organizations:
    post:
      tags:
        - Organizations
      summary: Create organization
      description: Create a new organization (user becomes OWNER)
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: Acme Corporation
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          description: Validation error
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: User already owns an organization or name taken
    
    get:
      tags:
        - Organizations
      summary: List user's organizations
      description: Get all organizations where user is a member
      operationId: listOrganizations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Organizations retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationWithRole'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /organizations/{organizationId}:
    get:
      tags:
        - Organizations
      summary: Get organization details
      operationId: getOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Organization retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    
    patch:
      tags:
        - Organizations
      summary: Update organization
      description: Update organization name (requires OWNER or ADMIN role)
      operationId: updateOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      tags:
        - Organizations
      summary: Delete organization
      description: Delete organization and all related data (requires OWNER role)
      operationId: deleteOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '204':
          description: Organization deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/members:
    get:
      tags:
        - Members
      summary: List organization members
      operationId: listMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Members retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    
    post:
      tags:
        - Members
      summary: Add member to organization
      description: Invite user by email (requires OWNER or ADMIN role)
      operationId: addMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - role
              properties:
                email:
                  type: string
                  format: email
                  description: Email of user to add
                role:
                  $ref: '#/components/schemas/MemberRole'
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          description: Validation error
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: User not found

  /organizations/{organizationId}/members/{memberId}:
    patch:
      tags:
        - Members
      summary: Update member role
      description: Change member role (requires OWNER or ADMIN)
      operationId: updateMemberRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  $ref: '#/components/schemas/MemberRole'
      responses:
        '200':
          description: Member role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          description: Cannot change OWNER role without transfer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    
    delete:
      tags:
        - Members
      summary: Remove member
      description: Remove member from organization (requires OWNER or ADMIN)
      operationId: removeMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Member removed
        '400':
          description: Cannot remove OWNER
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  schemas:
    Organization:
      type: object
      properties:
        id:
          type: string
          example: clx1234567890abcdef
        name:
          type: string
          example: Acme Corporation
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    OrganizationWithRole:
      allOf:
        - $ref: '#/components/schemas/Organization'
        - type: object
          properties:
            role:
              $ref: '#/components/schemas/MemberRole'
    
    Member:
      type: object
      properties:
        id:
          type: string
          example: clx1234567890abcdef
        userId:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
        organizationId:
          type: string
        role:
          $ref: '#/components/schemas/MemberRole'
        joinedAt:
          type: string
          format: date-time
    
    MemberRole:
      type: string
      enum:
        - OWNER
        - ADMIN
        - MEMBER
      description: |
        - OWNER: Full control, exactly one per organization
        - ADMIN: Full control, can be many
        - MEMBER: Restricted access (project-based)

  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
      description: Organization ID

  responses:
    Unauthorized:
      description: Unauthorized
    
    Forbidden:
      description: Forbidden - insufficient permissions
    
    NotFound:
      description: Resource not found

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
